site_name: ait-echt-oasis
site_description: A NOMAD plugin containing schemas, parsers, etc. for material processing and analysis methods at the ECHT group of AIT.
site_author: Maximilian Wolf

repo_url: https://github.com/mxwalbert/ait-echt-oasis
edit_uri: ""

nav:
  - Home: index.md
  - Tutorial: tutorial/tutorial.md
  - How-to guides:
      - Install this Plugin: how_to/install_this_plugin.md
      - Use this Plugin: how_to/use_this_plugin.md
      - Contribute to this plugin: how_to/contribute_to_this_plugin.md
      - Contribute to the documentation: how_to/contribute_to_the_documentation.md
  - Explanation: explanation/explanation.md
  - Reference:
      - References: reference/references.md
      - Infrastructure Schema: reference/schema_infrastructure.md
      - Physical Vapor Deposition Schema: reference/schema_physical_vapor_deposition.md
      - Sputter Deposition Schema: reference/schema_sputter_deposition.md
      - Vapor Deposition Schema: reference/schema_vapor_deposition.md
plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_schema_docs.py
theme:
  name: material
  palette:
    primary: "#2A4CDF"
    accent: "#008A67"
  font:
    text: "Titillium Web"
  logo: assets/nomad-plugin-logo.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
  custom_dir: docs/theme
  icon:
    repo: fontawesome/brands/github
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.extra
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: True
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - mkdocs-click
extra:
  generator: false
  homepage: https://nomad-lab.eu
use_directory_urls: false
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
